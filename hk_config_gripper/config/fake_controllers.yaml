controller_list:
  - name: fake_hkrobot_controller
    type: $(arg fake_execution_type)
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - j_hkrobot
  - name: fake_left_gripper_controller
    type: $(arg fake_execution_type)
    joints:
      - joint11
      - joint13
      - joint12
  - name: fake_right_gripper_controller
    type: $(arg fake_execution_type)
    joints:
      - joint21
      - joint23
      - joint22
initial:  # Define initial robot poses per group
  - group: hkrobot
    pose: home
  - group: left_gripper
    pose: on
  - group: right_gripper
    pose: on